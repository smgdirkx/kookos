services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    networks:
      - default
      - coolify
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: "3010"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    expose:
      - "80"
    depends_on:
      - api

networks:
  coolify:
    external: true
